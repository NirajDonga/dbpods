# 1. The Internal Network Routing (Service)
apiVersion: v1
kind: Service
metadata:
  name: tenant-123-db-svc
  labels:
    app: tenant-db
    tenant: tenant-123
spec:
  type: ClusterIP 
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: tenant-db
    tenant: tenant-123

---
# 2. The Database Container & Storage (StatefulSet)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tenant-123-db
  labels:
    app: tenant-db
    tenant: tenant-123
spec:
  serviceName: "tenant-123-db-svc"
  replicas: 1
  selector:
    matchLabels:
      app: tenant-db
      tenant: tenant-123
  template:
    metadata:
      labels:
        app: tenant-db
        tenant: tenant-123
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_PASSWORD
          value: "supersecret_manual_password" 
        - name: POSTGRES_USER
          value: "admin_123"
        - name: POSTGRES_DB
          value: "tenant_123_data"
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
  
  # 3. The Dedicated Virtual Hard Drive (PVC)
  # This automatically provisions a PersistentVolume linked to the pod
  volumeClaimTemplates:
  - metadata:
      name: pgdata
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi # 1 Gigabyte of baseline storage per tenant